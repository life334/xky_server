# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 9997

# Spring配置
spring:
  datasource:
    druid:
      # 主库数据源
      master:
        url: jdbc:postgresql://123.139.59.222:9032/xky_project?useSSL=false
        username: postgres
        password: 123456789pg
      # 从库数据源
      slave:
        # 从数据源开关/默认关闭
        enabled: false
        url:
        username:
        password:

  data:
    redis:
      # 地址
      host: 123.139.59.222
      # 端口，默认为6379
      port: 9379
      # 数据库索引
      database: 11
      # 密码
      password: 123456789redis
      # 连接超时时间
      timeout: 30s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 5
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池的最大数据库连接数
          max-active: 20
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
